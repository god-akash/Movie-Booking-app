<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineBook | Movie Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
  <style>
    /* ════════════════════════════════════════════════
       RESET & VARIABLES
    ════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              #0f0d16;
      --surface-low:     #14121c;
      --surface:         #1b1823;
      --surface-high:    #211e2a;
      --surface-highest: #272431;
      --surface-card:    rgba(39,36,49,0.45);
      --on-surface:      #f5eefc;
      --on-surface-var:  #aea9b6;
      --outline-var:     #494651;
      --outline:         #78737f;
      --primary:         #b6a0ff;
      --primary-dim:     #7e51ff;
      --secondary:       #00e3fd;
      --secondary-dim:   #00d4ec;
      --error:           #ff6e84;
      --grad:            linear-gradient(135deg,#7e51ff,#00d4ec);
      --font-head:       'Epilogue',sans-serif;
      --font-body:       'Manrope',sans-serif;
      --font-label:      'Plus Jakarta Sans',sans-serif;
      --sticky-h:        88px;  /* sticky bottom bar height */
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--on-surface);
      font-family: var(--font-body);
      min-height: 100dvh;
      overflow-x: hidden;
      padding-bottom: calc(var(--sticky-h) + 16px);
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }
    img { display: block; max-width: 100%; }

    /* ════════════════════════════════════════════════
       GLASS UTILITY
    ════════════════════════════════════════════════ */
    .glass {
      background: var(--surface-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(73,70,81,0.18);
    }

    /* shimmer skeleton */
    .skeleton {
      background: linear-gradient(90deg,#1b1823 25%,#272431 50%,#1b1823 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ════════════════════════════════════════════════
       TOP HEADER
       back → home.html | Movies (active) | Events | Tickets
    ════════════════════════════════════════════════ */
    .top-header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px;
      background: rgba(15,13,22,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(73,70,81,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      background: none; border: none;
      color: var(--on-surface);
      display: flex; align-items: center;
      transition: color 0.2s, transform 0.15s;
    }
    .back-btn:hover { color: var(--secondary-dim); transform: translateX(-2px); }
    .back-btn .material-symbols-outlined { font-size: 24px; }
    .logo-text {
      font-family: var(--font-head);
      font-size: 20px; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.4px;
    }

    .header-right { display: flex; align-items: center; gap: 20px; }
    /* Desktop nav links */
    .desktop-nav {
      display: none;
      gap: 28px;
      font-family: var(--font-label);
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .desktop-nav a { color: rgba(245,238,252,0.55); transition: color 0.2s; }
    .desktop-nav a:hover { color: var(--primary-dim); }
    .desktop-nav a.active { color: var(--secondary-dim); }

    .share-btn {
      background: none; border: none;
      color: var(--on-surface);
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .share-btn:hover { color: var(--secondary-dim); }
    .share-btn .material-symbols-outlined { font-size: 22px; }

    /* ════════════════════════════════════════════════
       HERO BANNER
    ════════════════════════════════════════════════ */
    .hero-banner {
      position: relative;
      width: 100%; height: 480px;
      min-height: 360px;
      overflow: hidden;
      margin-top: 56px; /* header height */
    }
    .hero-banner img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .hero-banner-skeleton {
      width: 100%; height: 100%;
      background: linear-gradient(90deg,#1b1823 25%,#272431 50%,#1b1823 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background:
        linear-gradient(to top, var(--bg) 0%, rgba(15,13,22,0.35) 55%, transparent 100%),
        linear-gradient(to right, var(--bg) 0%, transparent 55%);
    }
    .hero-info {
      position: absolute; bottom: 0; left: 0;
      padding: 0 24px 28px; max-width: 680px;
    }
    .genre-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .genre-chip {
      background: rgba(0,104,117,0.8);
      backdrop-filter: blur(8px);
      color: #e8fbff;
      padding: 4px 12px;
      border-radius: 6px;
      font-family: var(--font-label);
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .rating-chip {
      background: rgba(39,36,49,0.75);
      backdrop-filter: blur(8px);
      color: var(--on-surface);
      padding: 4px 10px;
      border-radius: 6px;
      font-family: var(--font-label);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; gap: 4px;
    }
    .rating-chip .material-symbols-outlined {
      font-size: 13px; color: #facc15;
      font-variation-settings: 'FILL' 1;
    }
    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(30px, 7vw, 64px);
      font-weight: 900; line-height: 1.0;
      letter-spacing: -1.5px; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 16px;
      font-family: var(--font-label);
      font-size: 13px; color: var(--on-surface-var);
    }
    .hero-meta span { display: flex; align-items: center; gap: 5px; }
    .hero-meta .material-symbols-outlined { font-size: 16px; }

    /* ════════════════════════════════════════════════
       MAIN CONTENT GRID
    ════════════════════════════════════════════════ */
    .content-wrap {
      max-width: 1200px; margin: 0 auto;
      padding: 32px 20px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    /* ── Poster (desktop only) ─────────────────── */
    .poster-col { display: none; }
    .poster-card {
      border-radius: 20px; overflow: hidden;
      padding: 8px;
      position: sticky; top: 80px;
    }
    .poster-card img { width: 100%; border-radius: 14px; }

    /* ── Info col ──────────────────────────────── */
    .info-col { display: flex; flex-direction: column; gap: 28px; }

    .section-label {
      font-family: var(--font-head);
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--primary);
      margin-bottom: 10px;
    }
    .synopsis-text {
      font-size: 15px; line-height: 1.75;
      color: var(--on-surface-var);
    }
    .read-more-btn {
      background: none; border: none;
      color: var(--secondary-dim);
      font-family: var(--font-label);
      font-size: 13px; font-weight: 700;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .read-more-btn:hover { opacity: 0.75; }

    /* Director / Cast row */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .director-card {
      display: flex; align-items: center; gap: 12px;
    }
    .director-avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--surface-high);
      border: 1px solid rgba(73,70,81,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .director-avatar .material-symbols-outlined { color: var(--secondary); font-size: 22px; }
    .director-name { font-weight: 600; font-size: 14px; }

    .cast-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .cast-chip {
      padding: 8px 14px;
      background: var(--surface-high);
      border-radius: 9999px;
      font-size: 13px; font-weight: 500;
      border: 1px solid rgba(73,70,81,0.22);
      transition: border-color 0.2s;
    }
    .cast-chip:hover { border-color: var(--primary-dim); }

    /* Trailer button */
    .trailer-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px;
      background: var(--surface-card);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(73,70,81,0.2);
      border-radius: 9999px;
      color: var(--on-surface);
      font-family: var(--font-label);
      font-size: 14px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.05em;
      transition: box-shadow 0.2s, transform 0.1s;
    }
    .trailer-btn:hover { box-shadow: 0 0 20px rgba(0,212,236,0.35); }
    .trailer-btn:active { transform: scale(0.97); }
    .trailer-btn .material-symbols-outlined { font-size: 22px; font-variation-settings:'FILL' 1; }

    /* ════════════════════════════════════════════════
       SELECT SHOW SECTION
       API: GET /api/movies/:id/shows?date=YYYY-MM-DD
       Returns: venues[] each with showtimes[]
    ════════════════════════════════════════════════ */
    .show-section { margin-top: 12px; }
    .show-section-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 22px;
    }
    .show-section-title {
      font-family: var(--font-head);
      font-size: 24px; font-weight: 900;
      text-transform: uppercase; letter-spacing: -0.5px;
    }
    .imax-badge {
      font-family: var(--font-label);
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--secondary);
    }

    /* Date picker row */
    .date-row {
      display: flex; gap: 10px;
      overflow-x: auto; padding-bottom: 8px;
      margin-bottom: 24px;
      -webkit-mask-image: linear-gradient(to right, transparent, black 4%, black 94%, transparent);
      mask-image: linear-gradient(to right, transparent, black 4%, black 94%, transparent);
    }
    .date-row::-webkit-scrollbar { display: none; }
    .date-btn {
      min-width: 72px; height: 88px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 18px;
      background: var(--surface-card);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(73,70,81,0.2);
      flex-shrink: 0;
      transition: border-color 0.2s, transform 0.15s;
    }
    .date-btn:hover { border-color: rgba(182,160,255,0.4); transform: translateY(-2px); }
    .date-btn.active {
      background: var(--grad);
      border: none;
      box-shadow: 0 0 18px rgba(126,81,255,0.35);
    }
    .date-btn .d-day {
      font-family: var(--font-head);
      font-size: 24px; font-weight: 900; line-height: 1;
    }
    .date-btn .d-month {
      font-family: var(--font-label);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; opacity: 0.75;
      margin-top: 2px;
    }
    .date-btn .d-name {
      font-family: var(--font-label);
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; opacity: 0.65;
      letter-spacing: 0.05em;
    }
    .date-btn.active .d-day,
    .date-btn.active .d-month,
    .date-btn.active .d-name { color: #000; opacity: 1; }

    /* Shows loading skeleton */
    .shows-skeleton {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .show-skeleton-card {
      height: 110px;
      border-radius: 18px;
    }

    /* Venue block */
    .venue-block {
      background: var(--surface-card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(73,70,81,0.18);
      border-radius: 24px;
      padding: 22px 20px;
      margin-bottom: 16px;
    }
    .venue-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px;
    }
    .venue-icon {
      color: var(--primary);
      font-variation-settings: 'FILL' 1;
      font-size: 30px;
    }
    .venue-name {
      font-family: var(--font-head);
      font-size: 18px; font-weight: 800;
      text-transform: uppercase; letter-spacing: -0.3px;
    }
    .venue-sub {
      font-family: var(--font-label);
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--on-surface-var);
      margin-top: 2px;
    }

    /* Showtime cards grid */
    .shows-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .show-card {
      padding: 18px 16px;
      border-radius: 18px;
      background: var(--surface-card);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(73,70,81,0.2);
      text-align: left;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      position: relative;
    }
    .show-card:not(.sold-out):not(.active-show):hover {
      border-color: rgba(182,160,255,0.35);
      transform: translateY(-2px);
    }
    /* selected show */
    .show-card.active-show {
      border-color: rgba(0,212,236,0.6);
      background: rgba(0,212,236,0.06);
      box-shadow: 0 0 18px rgba(0,212,236,0.25);
    }
    /* sold out */
    .show-card.sold-out {
      opacity: 0.45; cursor: not-allowed;
    }
    .show-time {
      font-family: var(--font-head);
      font-size: 22px; font-weight: 900;
      color: var(--on-surface);
      margin-bottom: 4px;
    }
    .show-card.active-show .show-time { color: var(--secondary-dim); }
    .show-status {
      font-family: var(--font-label);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .status-filling  { color: #f59e0b; }
    .status-available{ color: #34d399; }
    .status-soldout  { color: var(--error); }

    .show-footer { display: flex; justify-content: space-between; align-items: flex-end; }
    .show-format-tag {
      font-family: var(--font-label);
      font-size: 10px; font-weight: 600;
      padding: 3px 8px;
      background: var(--surface-highest);
      border-radius: 6px; color: var(--on-surface);
    }
    .show-price {
      font-family: var(--font-head);
      font-size: 17px; font-weight: 800;
    }

    /* no shows */
    .no-shows {
      text-align: center; padding: 32px;
      color: var(--on-surface-var);
      font-family: var(--font-label); font-size: 14px;
    }
    .no-shows .material-symbols-outlined { font-size: 40px; display: block; margin-bottom: 10px; }

    /* ════════════════════════════════════════════════
       REVIEWS SECTION
       API: GET /api/movies/:id/reviews
    ════════════════════════════════════════════════ */
    .reviews-section { margin-top: 12px; }
    .reviews-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
    }
    .reviews-title {
      font-family: var(--font-head);
      font-size: 24px; font-weight: 900;
      text-transform: uppercase; letter-spacing: -0.5px;
    }
    .avg-rating-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface-card);
      border: 1px solid rgba(73,70,81,0.2);
      border-radius: 12px;
      padding: 8px 14px;
      font-family: var(--font-head);
      font-size: 18px; font-weight: 900;
    }
    .avg-rating-badge .material-symbols-outlined {
      font-size: 20px; color: #facc15;
      font-variation-settings: 'FILL' 1;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .review-card {
      padding: 20px;
      background: var(--surface-card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(73,70,81,0.18);
      border-radius: 20px;
    }
    .review-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }
    .reviewer-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-label); font-size: 15px; font-weight: 700;
      color: #fff;
    }
    .reviewer-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    .review-date { font-size: 11px; color: var(--on-surface-var); }
    .review-stars { display: flex; gap: 2px; margin-top: 2px; }
    .review-stars .material-symbols-outlined {
      font-size: 14px; color: #facc15;
      font-variation-settings: 'FILL' 1;
    }
    .review-stars .material-symbols-outlined.empty {
      color: rgba(174,169,182,0.3);
      font-variation-settings: 'FILL' 0;
    }
    .review-text {
      font-size: 14px; line-height: 1.7;
      color: var(--on-surface-var); font-style: italic;
    }

    /* Write review button */
    .write-review-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: none;
      border: 1px dashed rgba(73,70,81,0.4);
      border-radius: 18px;
      color: var(--on-surface-var);
      font-family: var(--font-label);
      font-size: 13px; font-weight: 700;
      transition: border-color 0.2s, color 0.2s;
      margin-top: 8px;
    }
    .write-review-btn:hover { border-color: var(--primary-dim); color: var(--primary); }
    .write-review-btn .material-symbols-outlined { font-size: 18px; }

    /* ════════════════════════════════════════════════
       STICKY BOTTOM BAR
    ════════════════════════════════════════════════ */
    .sticky-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(20,18,28,0.94);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(126,81,255,0.12);
      padding: 14px 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .sticky-info {
      display: flex; align-items: center; gap: 12px;
    }
    .sticky-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: var(--surface-card);
      border: 1px solid rgba(73,70,81,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sticky-icon .material-symbols-outlined { color: var(--secondary); font-size: 20px; }
    .sticky-label {
      font-family: var(--font-label);
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--on-surface-var);
    }
    .sticky-value {
      font-family: var(--font-head);
      font-size: 15px; font-weight: 800;
      color: var(--on-surface);
    }
    .sticky-value.empty { color: var(--on-surface-var); font-size: 13px; font-weight: 500; }

    .proceed-btn {
      width: 100%; padding: 15px;
      background: var(--grad);
      border: none; border-radius: 9999px;
      color: #000;
      font-family: var(--font-head);
      font-size: 16px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.05em;
      box-shadow: 0 0 28px rgba(126,81,255,0.4);
      transition: filter 0.2s, transform 0.1s;
    }
    .proceed-btn:hover { filter: brightness(1.1); }
    .proceed-btn:active { transform: scale(0.98); }
    .proceed-btn:disabled {
      opacity: 0.45; cursor: not-allowed;
      filter: none; box-shadow: none;
    }

    /* ════════════════════════════════════════════════
       TOAST
    ════════════════════════════════════════════════ */
    .toast {
      position: fixed; bottom: calc(var(--sticky-h) + 70px); left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface-high);
      border: 1px solid rgba(73,70,81,0.3);
      border-radius: 12px; padding: 10px 18px;
      font-family: var(--font-label); font-size: 13px; font-weight: 600;
      color: var(--on-surface); opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200; white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ════════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════════ */
    @media (min-width: 640px) {
      .reviews-grid { grid-template-columns: 1fr 1fr; }
      .sticky-bar { flex-direction: row; align-items: center; }
      .sticky-info { flex: 1; }
      .proceed-btn { width: auto; padding: 15px 48px; }
      .hero-banner { height: 530px; }
    }
    @media (min-width: 900px) {
      .desktop-nav { display: flex; }
      .poster-col { display: block; }
      .detail-grid { grid-template-columns: 280px 1fr; }
      .hero-banner { height: 580px; }
      .meta-grid { grid-template-columns: 1fr 2fr; }
    }
    @media (max-width: 400px) {
      .hero-title { font-size: 26px; }
      .shows-grid { grid-template-columns: 1fr 1fr; }
      .date-btn { min-width: 62px; height: 78px; }
      .date-btn .d-day { font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       TOP HEADER
  ══════════════════════════════════════ -->
  <header class="top-header">
    <div class="header-left">
      <!-- back → home.html / previous page -->
      <button class="back-btn" onclick="history.back()" aria-label="Go back">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <a href="index.html" style="text-decoration:none;">
        <span class="logo-text">CineBook</span>
      </a>
    </div>
    <div class="header-right">
      <!-- Desktop nav: Movies (active) | Events | Tickets -->
      <nav class="desktop-nav">
        <a href="index.html"    class="active">Movies</a>
        <a href="events.html"           >Events</a>
        <a href="dashboard.html"          >Tickets</a>
      </nav>
      <!-- Share button -->
      <button class="share-btn" id="shareBtn" aria-label="Share">
        <span class="material-symbols-outlined">share</span>
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       HERO BANNER
       Filled from: movie.banner_url
  ══════════════════════════════════════ -->
  <div class="hero-banner" id="heroBanner">
    <div class="hero-banner-skeleton" id="heroBannerSkeleton"></div>
    <div class="hero-overlay"></div>
    <div class="hero-info" id="heroInfo">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════ -->
  <div class="content-wrap">
    <div class="detail-grid">

      <!-- Poster (desktop only) -->
      <div class="poster-col">
        <div class="glass poster-card" id="posterCard">
          <div class="skeleton" style="width:100%;aspect-ratio:2/3;border-radius:14px;" id="posterSkeleton"></div>
        </div>
      </div>

      <!-- Info + Shows + Reviews -->
      <div class="info-col" id="infoCol">

        <!-- synopsis skeleton -->
        <div id="synopsisSkeleton">
          <div class="skeleton" style="height:16px;width:80px;margin-bottom:12px;"></div>
          <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:14px;width:92%;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:14px;width:85%;"></div>
        </div>

        <!-- Shows section (always visible structure) -->
        <div class="show-section" id="showSection" style="display:none;">
          <div class="show-section-header">
            <h2 class="show-section-title">Select Show</h2>
            <span class="imax-badge" id="imaxBadge"></span>
          </div>
          <!-- Date row — 7 days from today -->
          <div class="date-row" id="dateRow"></div>
          <!-- Shows per venue — injected by JS -->
          <div id="venuesWrap"></div>
        </div>

        <!-- Reviews section -->
        <div class="reviews-section" id="reviewsSection" style="display:none;">
          <div class="reviews-header">
            <h2 class="reviews-title">Audience Reviews</h2>
            <div class="avg-rating-badge" id="avgRatingBadge">
              <span class="material-symbols-outlined">star</span>
              <span id="avgRatingVal">—</span>
            </div>
          </div>
          <div class="reviews-grid" id="reviewsGrid"></div>
          <button class="write-review-btn" id="writeReviewBtn">
            <span class="material-symbols-outlined">edit</span>
            Write a Review
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       STICKY BOTTOM BAR
  ══════════════════════════════════════ -->
  <div class="sticky-bar">
    <div class="sticky-info">
      <div class="sticky-icon">
        <span class="material-symbols-outlined">confirmation_number</span>
      </div>
      <div>
        <div class="sticky-label">Selected Show</div>
        <div class="sticky-value empty" id="stickyValue">No show selected</div>
      </div>
    </div>
    <button class="proceed-btn" id="proceedBtn" disabled
      onclick="proceedToBook()">
      Proceed to Book
    </button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ══════════════════════════════════════
       JAVASCRIPT
  ══════════════════════════════════════ -->
  <script>
    /* ─────────────────────────────────────────────────
       CONFIG
    ───────────────────────────────────────────────── */
    const API_BASE = 'http://localhost:5000/api';

    /* ── Auth ─────────────────────────────────────── */
    function getToken() { return localStorage.getItem('cinebook_token'); }
    (function guardAuth() {
      if (!getToken()) window.location.href = 'login.html';
    })();

    /* ── Get movie ID from URL params ─────────────── */
    /* URL format: movie-detail.html?id=5
       OR:         movie-detail.html?slug=interstellar-rerelease */
    const params   = new URLSearchParams(window.location.search);
    const movieId  = params.get('id');
    const movieSlug= params.get('slug');

    if (!movieId && !movieSlug) {
      showToast('Movie not found. Redirecting...');
      setTimeout(() => window.location.href = 'index.html', 1500);
    }

    /* ── API helper ───────────────────────────────── */
    async function apiFetch(endpoint) {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`
        }
      });
      if (res.status === 401) { window.location.href = 'login.html'; return null; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    /* ── Toast ────────────────────────────────────── */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2600);
    }

    /* ── XSS escape ───────────────────────────────── */
    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Stars HTML ───────────────────────────────── */
    function starsHtml(rating, size = 16) {
      let h = '';
      for (let i = 1; i <= 5; i++) {
        h += `<span class="material-symbols-outlined ${i <= Math.round(rating) ? '' : 'empty'}"
               style="font-size:${size}px;">${i <= Math.round(rating) ? 'star' : 'star'}</span>`;
      }
      return `<div class="review-stars">${h}</div>`;
    }

    /* ── Avatar gradient colors ───────────────────── */
    const avatarColors = [
      'linear-gradient(135deg,#7e51ff,#00d4ec)',
      'linear-gradient(135deg,#ff6c95,#7e51ff)',
      'linear-gradient(135deg,#00d4ec,#34d399)',
      'linear-gradient(135deg,#f59e0b,#ff6c95)',
    ];

    /* ─────────────────────────────────────────────────
       LOAD MOVIE DETAIL
       GET /api/movies/:id  OR  GET /api/movies/slug/:slug
       Expected fields:
         id, title, banner_url, poster_url, genres[],
         rating, duration, release_date, language,
         format (IMAX/Standard), synopsis, director,
         cast[], trailer_url
    ───────────────────────────────────────────────── */
    let movieData = null;
    let selectedShow = null;  /* { venueId, venueName, date, time, format, price, showId } */

    async function loadMovieDetail() {
      try {
        const endpoint = movieId
          ? `/movies/${movieId}`
          : `/movies/slug/${movieSlug}`;
        const movie = await apiFetch(endpoint);
        if (!movie) return;
        movieData = movie;
        renderMovieDetail(movie);
      } catch (e) {
        console.error('Movie detail load failed:', e);
        showToast('Failed to load movie details.');
      }
    }

    function renderMovieDetail(movie) {
      /* ── Update page title ── */
      document.title = `CineBook | ${movie.title}`;

      /* ── Hero banner ── */
      const bannerEl = document.getElementById('heroBanner');
      const skeleton = document.getElementById('heroBannerSkeleton');
      const img = new Image();
      img.src = movie.banner_url || movie.poster_url || '';
      img.alt = esc(movie.title);
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      img.onload = () => skeleton.style.display = 'none';
      bannerEl.insertBefore(img, bannerEl.firstChild);

      /* ── Hero info overlay ── */
      document.getElementById('heroInfo').innerHTML = `
        <div class="genre-row">
          ${(movie.genres || []).map(g => `<span class="genre-chip">${esc(g)}</span>`).join('')}
          <span class="rating-chip">
            <span class="material-symbols-outlined">star</span>${(movie.rating || 0).toFixed(1)}
          </span>
        </div>
        <h1 class="hero-title">${esc(movie.title)}</h1>
        <div class="hero-meta">
          <span><span class="material-symbols-outlined">schedule</span>${esc(movie.duration || '')}</span>
          <span><span class="material-symbols-outlined">calendar_today</span>${esc(movie.release_date || '')}</span>
          <span><span class="material-symbols-outlined">subtitles</span>${esc(movie.language || '')}${movie.format ? ', ' + esc(movie.format) : ''}</span>
        </div>`;

      /* ── Poster (desktop) ── */
      const posterEl = document.getElementById('posterCard');
      document.getElementById('posterSkeleton').remove();
      posterEl.innerHTML = `<img src="${esc(movie.poster_url || movie.banner_url)}" alt="${esc(movie.title)}" style="width:100%;border-radius:14px;" loading="lazy"/>`;

      /* ── Synopsis & info ── */
      const shortSynopsis = (movie.synopsis || '').slice(0, 220);
      const fullSynopsis  = movie.synopsis || '';
      const isLong = fullSynopsis.length > 220;

      document.getElementById('synopsisSkeleton').outerHTML = `
        <div id="synopsisBlock">
          <div class="section-label">Synopsis</div>
          <p class="synopsis-text" id="synopsisText">${esc(isLong ? shortSynopsis + '...' : fullSynopsis)}</p>
          ${isLong ? `<button class="read-more-btn" id="readMoreBtn"
            onclick="toggleSynopsis(${JSON.stringify(fullSynopsis).replace(/</g,'\\u003c')})">
            Read More</button>` : ''}
        </div>
        <div class="meta-grid">
          <div>
            <div class="section-label">Director</div>
            <div class="director-card">
              <div class="director-avatar">
                <span class="material-symbols-outlined">movie_edit</span>
              </div>
              <span class="director-name">${esc(movie.director || 'N/A')}</span>
            </div>
          </div>
          <div>
            <div class="section-label">Cast</div>
            <div class="cast-chips">
              ${(movie.cast || []).map(c => `<span class="cast-chip">${esc(c)}</span>`).join('')}
            </div>
          </div>
        </div>
        ${movie.trailer_url ? `
        <div>
          <button class="trailer-btn" onclick="window.open('${esc(movie.trailer_url)}','_blank')">
            <span class="material-symbols-outlined">play_circle</span>Watch Trailer
          </button>
        </div>` : ''}`;

      /* ── Show format badge ── */
      if (movie.format) document.getElementById('imaxBadge').textContent = movie.format + ' Experience';

      /* ── Show the show section ── */
      document.getElementById('showSection').style.display = 'block';

      /* ── Build date row (today + 6 days) ── */
      buildDateRow();

      /* ── Load shows for today ── */
      const today = todayStr();
      loadShows(movie.id || movieId, today);

      /* ── Load reviews ── */
      loadReviews(movie.id || movieId);
    }

    /* ── Synopsis toggle ─────────────────────────── */
    let synopsisExpanded = false;
    function toggleSynopsis(full) {
      synopsisExpanded = !synopsisExpanded;
      const el = document.getElementById('synopsisText');
      const btn = document.getElementById('readMoreBtn');
      const short = full.slice(0, 220) + '...';
      el.textContent = synopsisExpanded ? full : short;
      btn.textContent = synopsisExpanded ? 'Show Less' : 'Read More';
    }

    /* ─────────────────────────────────────────────────
       DATE ROW — 7 days starting today
    ───────────────────────────────────────────────── */
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function buildDateRow() {
      const row = document.getElementById('dateRow');
      row.innerHTML = '';
      const base = new Date();

      for (let i = 0; i < 7; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const btn = document.createElement('button');
        btn.className = `date-btn ${i === 0 ? 'active' : ''}`;
        btn.dataset.date = dateStr;
        btn.innerHTML = `
          <span class="d-name">${DAY_NAMES[d.getDay()]}</span>
          <span class="d-day">${d.getDate()}</span>
          <span class="d-month">${MONTH_NAMES[d.getMonth()]}</span>`;
        btn.addEventListener('click', () => selectDate(btn, dateStr));
        row.appendChild(btn);
      }
    }

    function selectDate(btn, dateStr) {
      /* clear previous selection */
      document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      /* reset show selection */
      clearShowSelection();
      /* load shows for new date */
      loadShows(movieData?.id || movieId, dateStr);
    }

    /* ─────────────────────────────────────────────────
       LOAD SHOWS
       GET /api/movies/:id/shows?date=YYYY-MM-DD
       Expected:
       [
         {
           venue_id, venue_name, venue_address,
           showtimes: [
             { show_id, time, format, price,
               status: "available"|"filling_fast"|"sold_out",
               available_seats }
           ]
         }
       ]
    ───────────────────────────────────────────────── */
    async function loadShows(id, dateStr) {
      const wrap = document.getElementById('venuesWrap');

      /* show skeleton */
      wrap.innerHTML = `
        <div class="shows-skeleton">
          ${[1,2,3,4].map(() => `<div class="show-skeleton-card skeleton"></div>`).join('')}
        </div>`;

      try {
        const data = await apiFetch(`/movies/${id}/shows?date=${dateStr}`);

        if (!data || !data.length) {
          wrap.innerHTML = `<div class="no-shows">
            <span class="material-symbols-outlined">event_busy</span>
            No shows available on this date.
          </div>`;
          return;
        }

        wrap.innerHTML = data.map(venue => `
          <div class="venue-block">
            <div class="venue-header">
              <span class="material-symbols-outlined venue-icon">theaters</span>
              <div>
                <div class="venue-name">${esc(venue.venue_name)}</div>
                <div class="venue-sub">${esc(venue.venue_address || '')}</div>
              </div>
            </div>
            <div class="shows-grid">
              ${(venue.showtimes || []).map(show => {
                const isSold = show.status === 'sold_out';
                const isFill = show.status === 'filling_fast';
                const statusLabel  = isSold ? 'Sold Out' : isFill ? 'Filling Fast' : 'Available';
                const statusClass  = isSold ? 'status-soldout' : isFill ? 'status-filling' : 'status-available';
                return `
                  <button
                    class="show-card ${isSold ? 'sold-out' : ''}"
                    id="show-${show.show_id}"
                    data-show='${JSON.stringify({
                      showId: show.show_id,
                      venueId: venue.venue_id,
                      venueName: venue.venue_name,
                      time: show.time,
                      format: show.format,
                      price: show.price,
                      status: show.status
                    }).replace(/'/g,"&#39;")}'
                    ${isSold ? 'disabled' : `onclick="selectShow(this)"`}
                    aria-label="${esc(show.time)} at ${esc(venue.venue_name)}">
                    <div class="show-time">${esc(show.time)}</div>
                    <div class="show-status ${statusClass}">${statusLabel}</div>
                    <div class="show-footer">
                      <span class="show-format-tag">${esc(show.format || 'Standard')}</span>
                      <span class="show-price">₹${Number(show.price).toFixed(0)}</span>
                    </div>
                  </button>`;
              }).join('')}
            </div>
          </div>`).join('');

      } catch (e) {
        console.error('Shows load failed:', e);
        wrap.innerHTML = `<div class="no-shows">
          <span class="material-symbols-outlined">error</span>
          Failed to load show timings.
        </div>`;
      }
    }

    /* ── Select a show ────────────────────────────── */
    function selectShow(btn) {
      /* deselect previous */
      document.querySelectorAll('.show-card.active-show').forEach(c => c.classList.remove('active-show'));
      btn.classList.add('active-show');

      /* parse show data */
      try {
        selectedShow = JSON.parse(btn.dataset.show);
      } catch { return; }

      /* get selected date */
      const activeDateBtn = document.querySelector('.date-btn.active');
      const dateStr = activeDateBtn?.dataset.date || todayStr();
      const dateFormatted = new Date(dateStr + 'T00:00:00').toLocaleDateString('en-IN',{
        day:'numeric', month:'short', year:'numeric'
      });
      selectedShow.date = dateStr;

      /* update sticky bar */
      const stickyEl = document.getElementById('stickyValue');
      stickyEl.textContent = `${dateFormatted}, ${selectedShow.time} — ${esc(selectedShow.venueName)}`;
      stickyEl.classList.remove('empty');

      /* enable proceed button */
      document.getElementById('proceedBtn').disabled = false;

      showToast(`${selectedShow.time} at ${selectedShow.venueName} selected`);
    }

    function clearShowSelection() {
      document.querySelectorAll('.show-card.active-show').forEach(c => c.classList.remove('active-show'));
      selectedShow = null;
      const stickyEl = document.getElementById('stickyValue');
      stickyEl.textContent = 'No show selected';
      stickyEl.classList.add('empty');
      document.getElementById('proceedBtn').disabled = true;
    }

    /* ─────────────────────────────────────────────────
       PROCEED TO BOOK
       Passes showId, movieId → seat-selection.html
    ───────────────────────────────────────────────── */
    function proceedToBook() {
      if (!selectedShow) { showToast('Please select a show first.'); return; }
      const id = movieData?.id || movieId;
      window.location.href =
        `booking.html?movieId=${id}&showId=${selectedShow.showId}&date=${selectedShow.date}`;
    }

    /* ─────────────────────────────────────────────────
       LOAD REVIEWS
       GET /api/movies/:id/reviews
       Expected: { avg_rating, reviews: [
         { id, user_name, user_avatar, rating,
           comment, created_at }
       ]}
    ───────────────────────────────────────────────── */
    async function loadReviews(id) {
      try {
        const data = await apiFetch(`/movies/${id}/reviews`);
        const section = document.getElementById('reviewsSection');
        const grid    = document.getElementById('reviewsGrid');
        section.style.display = 'block';

        /* avg rating */
        if (data?.avg_rating) {
          document.getElementById('avgRatingVal').textContent = Number(data.avg_rating).toFixed(1);
        }

        const reviews = data?.reviews || [];
        if (!reviews.length) {
          grid.innerHTML = `<div style="color:var(--on-surface-var);font-family:var(--font-label);font-size:13px;padding:12px 0;grid-column:1/-1;">
            No reviews yet. Be the first to write one!
          </div>`;
          return;
        }

        grid.innerHTML = reviews.map((r, i) => {
          const initials = (r.user_name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
          const avatarStyle = r.user_avatar
            ? `background-image:url(${esc(r.user_avatar)});background-size:cover;background-position:center;`
            : `background:${avatarColors[i % avatarColors.length]};`;
          const date = r.created_at
            ? new Date(r.created_at).toLocaleDateString('en-IN',{month:'short',year:'numeric'})
            : '';
          return `
            <div class="review-card">
              <div class="review-header">
                <div class="reviewer-avatar" style="${avatarStyle}">
                  ${r.user_avatar ? '' : initials}
                </div>
                <div>
                  <div class="reviewer-name">${esc(r.user_name || 'Anonymous')}</div>
                  <div class="review-date">${date}</div>
                  ${starsHtml(r.rating)}
                </div>
              </div>
              <p class="review-text">"${esc(r.comment || '')}"</p>
            </div>`;
        }).join('');

      } catch (e) {
        console.error('Reviews load failed:', e);
        document.getElementById('reviewsSection').style.display = 'block';
        document.getElementById('reviewsGrid').innerHTML =
          `<div style="color:var(--on-surface-var);font-size:13px;font-family:var(--font-label);">
            Could not load reviews.
          </div>`;
      }
    }

    /* ── Write review ─────────────────────────────── */
    document.getElementById('writeReviewBtn').addEventListener('click', () => {
      const id = movieData?.id || movieId;
      window.location.href = `write-review.html?movieId=${id}`;
    });

    /* ── Share button ─────────────────────────────── */
    document.getElementById('shareBtn').addEventListener('click', async () => {
      const url = window.location.href;
      if (navigator.share) {
        try {
          await navigator.share({
            title: movieData?.title || 'CineBook',
            text: `Book tickets for ${movieData?.title || 'this movie'} on CineBook!`,
            url
          });
        } catch {}
      } else {
        navigator.clipboard?.writeText(url).then(() => showToast('Link copied to clipboard!'));
      }
    });

    loadMovieDetail();
  </script>

</body>
</html>
