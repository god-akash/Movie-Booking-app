<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineBook – Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface:         #0f0d16;
      --surface-card:    rgba(39, 36, 49, 0.62);
      --surface-high:    #211e2a;
      --surface-highest: #272431;
      --on-surface:      #f5eefc;
      --on-surface-var:  #aea9b6;
      --outline-var:     #494651;
      --outline:         #78737f;
      --primary:         #b6a0ff;
      --primary-dim:     #7e51ff;
      --secondary:       #00e3fd;
      --secondary-dim:   #00d4ec;
      --error:           #ff6e84;
      --grad-btn:        linear-gradient(135deg, #7e51ff 0%, #00d4ec 100%);
      --font-head:       'Epilogue', sans-serif;
      --font-body:       'Manrope', sans-serif;
      --font-label:      'Plus Jakarta Sans', sans-serif;
    }

    html, body {
      width: 100%;
      min-height: 100dvh;
      background: var(--surface);
      color: var(--on-surface);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* ── Background collage ───────────────────────── */
    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      opacity: 0.4;
    }
    .bg-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      padding: 12px;
      transform: rotate(-12deg) scale(1.3);
      filter: blur(3px) grayscale(1);
      opacity: 0.5;
    }
    .bg-grid img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 12px;
    }
    .bg-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        var(--surface) 0%,
        transparent 20%,
        transparent 80%,
        var(--surface) 100%);
    }

    /* ── Page Shell ───────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 16px;
    }

    /* ── Glass Card ───────────────────────────────── */
    .glass-card {
      width: 100%;
      max-width: 500px;
      background: var(--surface-card);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(73, 70, 81, 0.18);
      border-radius: 32px;
      padding: 44px 40px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(182, 160, 255, 0.06);
    }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(72px); pointer-events: none; z-index: 0;
    }
    .blob-tl { top:-80px; left:-80px; width:200px; height:200px; background:rgba(182,160,255,0.09); }
    .blob-br { bottom:-80px; right:-80px; width:200px; height:200px; background:rgba(0,212,236,0.07); }

    /* all children above blobs */
    .logo-section, .msg, .reg-form, .signin-footer, .deco { position: relative; z-index: 1; }

    /* ── Logo Section ─────────────────────────────── */
    .logo-section {
      display: flex; flex-direction: column;
      align-items: center; margin-bottom: 32px;
    }
    .logo-icon-wrap {
      position: relative; margin-bottom: 14px;
    }
    .logo-icon-glow {
      position: absolute; inset: 0;
      background: rgba(126,81,255,0.2);
      border-radius: 50%; filter: blur(24px);
      transform: scale(1.5);
    }
    .logo-icon {
      position: relative;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #7e51ff, #00d4ec);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(126,81,255,0.4);
    }
    .logo-icon .material-symbols-outlined {
      font-size: 32px; color: #fff;
      font-variation-settings: 'FILL' 1;
    }
    .logo-name {
      font-family: var(--font-head);
      font-size: 26px; font-weight: 900;
      background: linear-gradient(90deg, #7e51ff, #00d4ec);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .logo-tagline {
      font-family: var(--font-label);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--on-surface-var);
      margin-top: 6px;
    }

    /* ── Message Box ──────────────────────────────── */
    .msg {
      padding: 11px 14px;
      border-radius: 12px;
      font-family: var(--font-label);
      font-size: 13px; font-weight: 600;
      margin-bottom: 18px;
      display: none;
    }
    .msg.error   { background:rgba(255,110,132,0.12); color:#ff6e84; border:1px solid rgba(255,110,132,0.22); }
    .msg.success { background:rgba(0,227,253,0.10); color:var(--secondary); border:1px solid rgba(0,227,253,0.22); }
    .msg.show    { display: block; }

    /* ── Form ─────────────────────────────────────── */
    .reg-form { display: flex; flex-direction: column; gap: 24px; }

    /* Field group with icon */
    .field-group {
      position: relative;
    }
    .field-icon {
      position: absolute; left: 0; top: 10px;
      color: var(--outline);
      font-size: 22px;
      transition: color 0.25s;
      pointer-events: none;
    }
    .field-group:focus-within .field-icon { color: var(--primary-dim); }

    .field-group input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(73,70,81,0.38);
      padding: 12px 36px 12px 32px;
      color: var(--on-surface);
      font-family: var(--font-label);
      font-size: 15px; font-weight: 500;
      outline: none;
      transition: border-color 0.3s;
    }
    .field-group input:focus { border-bottom-color: var(--primary); }

    .field-group label {
      position: absolute;
      left: 32px; top: 12px;
      color: var(--on-surface-var);
      font-family: var(--font-label);
      font-size: 14px;
      pointer-events: none;
      transform-origin: left;
      transition: transform 0.25s ease, color 0.25s ease;
    }
    .field-group input:focus + label,
    .field-group input:not(:placeholder-shown) + label {
      transform: translateY(-22px) scale(0.82);
      color: var(--primary);
    }

    /* Eye toggle */
    .eye-btn {
      position: absolute; right: 0; top: 10px;
      background: none; border: none; cursor: pointer;
      color: var(--on-surface-var); transition: color 0.2s;
      display: flex; align-items: center; padding: 0;
    }
    .eye-btn:hover { color: var(--primary); }
    .eye-btn .material-symbols-outlined { font-size: 22px; }

    /* ── Password Strength ────────────────────────── */
    .strength-wrap { margin-top: 10px; }
    .strength-bars {
      display: flex; gap: 5px; height: 4px; margin-bottom: 6px;
    }
    .strength-bar {
      flex: 1; border-radius: 9999px;
      background: rgba(73,70,81,0.35);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .strength-bar.active-weak   { background: #ff6e84; box-shadow: 0 0 6px rgba(255,110,132,0.5); }
    .strength-bar.active-fair   { background: #ffb347; box-shadow: 0 0 6px rgba(255,179,71,0.5); }
    .strength-bar.active-good   { background: #00d4ec; box-shadow: 0 0 6px rgba(0,212,236,0.5); }
    .strength-bar.active-strong { background: #7e51ff; box-shadow: 0 0 6px rgba(126,81,255,0.5); }
    .strength-label {
      font-family: var(--font-label);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--on-surface-var);
      transition: color 0.3s;
    }
    .strength-label.weak   { color: #ff6e84; }
    .strength-label.fair   { color: #ffb347; }
    .strength-label.good   { color: var(--secondary-dim); }
    .strength-label.strong { color: var(--primary); }

    /* ── Terms Checkbox ───────────────────────────── */
    .terms-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding-top: 4px;
    }
    .checkbox-wrap {
      position: relative; flex-shrink: 0;
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .checkbox-wrap input[type="checkbox"] {
      appearance: none;
      width: 20px; height: 20px;
      border: 2px solid var(--outline-var);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      padding: 0;
    }
    .checkbox-wrap input[type="checkbox"]:checked {
      background: var(--secondary-dim);
      border-color: var(--secondary-dim);
    }
    .checkbox-check {
      position: absolute; pointer-events: none;
      font-size: 14px; color: #fff;
      font-variation-settings: 'FILL' 1;
      opacity: 0; transform: scale(0.5);
      transition: opacity 0.2s, transform 0.2s;
    }
    .checkbox-wrap input[type="checkbox"]:checked ~ .checkbox-check {
      opacity: 1; transform: scale(1);
    }
    .terms-text {
      font-family: var(--font-label);
      font-size: 12px; color: var(--on-surface-var);
      line-height: 1.6;
    }
    .terms-text a {
      color: var(--secondary-dim); text-decoration: underline;
      text-decoration-color: rgba(0,212,236,0.3);
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .terms-text a:hover { color: var(--primary-dim); }

    /* ── Register Button ──────────────────────────── */
    .btn-register {
      width: 100%; height: 56px;
      border: none; border-radius: 9999px;
      background: var(--grad-btn);
      color: #fff;
      font-family: var(--font-head);
      font-size: 17px; font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(126,81,255,0.3);
      transition: box-shadow 0.2s, transform 0.1s, filter 0.2s;
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn-register::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.18);
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .btn-register:hover::after { transform: translateY(0); }
    .btn-register:hover { box-shadow: 0 15px 35px rgba(0,212,236,0.4); }
    .btn-register:active { transform: scale(0.97); }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }
    .btn-register:disabled::after { display: none; }

    /* spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none; flex-shrink: 0;
    }
    .btn-register.loading .spinner { display: block; }
    .btn-register.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sign In Footer ───────────────────────────── */
    .signin-footer {
      margin-top: 28px; text-align: center;
      font-family: var(--font-label);
      font-size: 13px; color: var(--on-surface-var);
    }
    .signin-footer a {
      color: var(--primary); font-weight: 700;
      text-decoration: none; margin-left: 4px;
      transition: color 0.2s;
    }
    .signin-footer a:hover { color: var(--secondary); text-decoration: underline; }

    /* ── Bottom Deco ──────────────────────────────── */
    .deco {
      display: flex; align-items: center; gap: 12px;
      margin-top: 24px;
      color: rgba(174, 169, 182, 0.3);
    }
    .deco-line { width: 32px; height: 1px; background: currentColor; }
    .deco .material-symbols-outlined { font-size: 20px; }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 540px) {
      .glass-card { padding: 32px 22px; border-radius: 26px; }
      .logo-name  { font-size: 22px; }
    }
    @media (max-width: 380px) {
      .glass-card { padding: 28px 16px; border-radius: 22px; }
      .bg-grid    { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

  <!-- Page -->
  <div class="page">
    <div class="glass-card">
      <div class="blob blob-tl"></div>
      <div class="blob blob-br"></div>

      <!-- Logo -->
      <div class="logo-section">
        <div class="logo-icon-wrap">
          <div class="logo-icon-glow"></div>
          <div class="logo-icon">
            <span class="material-symbols-outlined">movie</span>
          </div>
        </div>
        <span class="logo-name">CineBook</span>
        <span class="logo-tagline">Join the Digital Theater</span>
      </div>

      <!-- Message Box -->
      <div class="msg" id="msg"></div>

      <!-- Form -->
      <form class="reg-form" id="registerForm" novalidate>

        <!-- Full Name -->
        <div class="field-group">
          <span class="material-symbols-outlined field-icon">person</span>
          <input type="text" id="fullname" placeholder=" " autocomplete="name" required />
          <label for="fullname">Full Name</label>
        </div>

        <!-- Email -->
        <div class="field-group">
          <span class="material-symbols-outlined field-icon">mail</span>
          <input type="email" id="email" placeholder=" " autocomplete="email" required />
          <label for="email">Email Address</label>
        </div>

        <!-- Phone -->
        <div class="field-group">
          <span class="material-symbols-outlined field-icon">call</span>
          <input type="tel" id="phone" placeholder=" " autocomplete="tel" required />
          <label for="phone">Phone Number</label>
        </div>

        <!-- Password -->
        <div class="field-group">
          <span class="material-symbols-outlined field-icon">lock</span>
          <input type="password" id="password" placeholder=" " autocomplete="new-password" required />
          <label for="password">Password</label>
          <button type="button" class="eye-btn" id="eyeBtn1" aria-label="Toggle password">
            <span class="material-symbols-outlined" id="eyeIcon1">visibility</span>
          </button>
          <!-- Strength meter -->
          <div class="strength-wrap">
            <div class="strength-bars">
              <div class="strength-bar" id="bar1"></div>
              <div class="strength-bar" id="bar2"></div>
              <div class="strength-bar" id="bar3"></div>
              <div class="strength-bar" id="bar4"></div>
            </div>
            <span class="strength-label" id="strengthLabel">Enter a password</span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="field-group">
          <span class="material-symbols-outlined field-icon">lock_reset</span>
          <input type="password" id="confirmPassword" placeholder=" " autocomplete="new-password" required />
          <label for="confirmPassword">Confirm Password</label>
          <button type="button" class="eye-btn" id="eyeBtn2" aria-label="Toggle confirm password">
            <span class="material-symbols-outlined" id="eyeIcon2">visibility</span>
          </button>
        </div>

        <!-- Terms -->
        <div class="terms-row">
          <div class="checkbox-wrap">
            <input type="checkbox" id="terms" />
            <span class="material-symbols-outlined checkbox-check">check</span>
          </div>
          <label class="terms-text" for="terms">
            I agree to the
            <a href="#">Terms of Service</a> and
            <a href="#">Privacy Policy</a>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-register" id="registerBtn">
          <div class="spinner"></div>
          <span class="btn-text">Create My Account</span>
        </button>

      </form>

      <!-- Sign In link -->
      <p class="signin-footer">
        Already have an account?
        <a href="login.html">Log In</a>
      </p>
    </div>

    <!-- Bottom deco -->
    <div class="deco">
      <span class="deco-line"></span>
      <span class="material-symbols-outlined">confirmation_number</span>
      <span class="deco-line"></span>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    const form            = document.getElementById('registerForm');
    const fullnameEl      = document.getElementById('fullname');
    const emailEl         = document.getElementById('email');
    const phoneEl         = document.getElementById('phone');
    const passwordEl      = document.getElementById('password');
    const confirmPassEl   = document.getElementById('confirmPassword');
    const termsEl         = document.getElementById('terms');
    const registerBtn     = document.getElementById('registerBtn');
    const msgBox          = document.getElementById('msg');

    function makeEyeToggle(btnId, iconId, inputEl) {
      document.getElementById(btnId).addEventListener('click', () => {
        const isPass = inputEl.type === 'password';
        inputEl.type = isPass ? 'text' : 'password';
        document.getElementById(iconId).textContent = isPass ? 'visibility_off' : 'visibility';
      });
    }
    makeEyeToggle('eyeBtn1', 'eyeIcon1', passwordEl);
    makeEyeToggle('eyeBtn2', 'eyeIcon2', confirmPassEl);

    const bars   = [1,2,3,4].map(i => document.getElementById(`bar${i}`));
    const label  = document.getElementById('strengthLabel');

    function scorePassword(p) {
      let s = 0;
      if (p.length >= 6)  s++;
      if (p.length >= 10) s++;
      if (/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
      if (/[0-9]/.test(p)) s++;
      if (/[^A-Za-z0-9]/.test(p)) s++;
      return Math.min(s, 4);
    }

    const levels = [
      { cls: 'active-weak',   lbl: 'Weak',   lblCls: 'weak'   },
      { cls: 'active-fair',   lbl: 'Fair',   lblCls: 'fair'   },
      { cls: 'active-good',   lbl: 'Good',   lblCls: 'good'   },
      { cls: 'active-strong', lbl: 'Strong', lblCls: 'strong' },
    ];

    passwordEl.addEventListener('input', () => {
      const val   = passwordEl.value;
      const score = val.length === 0 ? 0 : scorePassword(val);

      bars.forEach((b, i) => {
        b.className = 'strength-bar';
        if (val.length > 0 && i < score) {
          b.classList.add(levels[score - 1].cls);
        }
      });

      if (val.length === 0) {
        label.textContent = 'Enter a password';
        label.className   = 'strength-label';
      } else {
        const lvl = levels[score - 1];
        label.textContent = lvl.lbl;
        label.className   = `strength-label ${lvl.lblCls}`;
      }
    });

    function showMsg(text, type = 'error') {
      msgBox.textContent = text;
      msgBox.className   = `msg ${type} show`;
      msgBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function hideMsg() { msgBox.className = 'msg'; }

    function setLoading(on) {
      registerBtn.disabled = on;
      registerBtn.classList.toggle('loading', on);
    }

    function validate() {
      const name    = fullnameEl.value.trim();
      const email   = emailEl.value.trim();
      const phone   = phoneEl.value.trim();
      const pass    = passwordEl.value;
      const confirm = confirmPassEl.value;

      if (!name || name.length < 2) {
        showMsg('Please enter your full name (at least 2 characters).'); return false;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMsg('Please enter a valid email address.'); return false;
      }
      if (!phone || !/^\+?[\d\s\-]{7,15}$/.test(phone)) {
        showMsg('Please enter a valid phone number.'); return false;
      }
      if (!pass || pass.length < 6) {
        showMsg('Password must be at least 6 characters.'); return false;
      }
      if (pass !== confirm) {
        showMsg('Passwords do not match. Please re-enter.'); return false;
      }
      if (!termsEl.checked) {
        showMsg('Please accept the Terms of Service and Privacy Policy.'); return false;
      }
      return true;
    }

    /* ──  API CALL ─────────────────────────────── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();
      if (!validate()) return;

      setLoading(true);

      const payload = {
        name:     fullnameEl.value.trim(),
        email:    emailEl.value.trim(),
        phone:    phoneEl.value.trim(),
        password: passwordEl.value,
      };

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.ok) {
          if (data.token) localStorage.setItem('cinebook_token', data.token);
          if (data.user)  localStorage.setItem('cinebook_user', JSON.stringify(data.user));

          showMsg('Account created! Redirecting to login…', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1400);

        } else {
          showMsg(data.message || 'Registration failed. Please try again.');
        }

      } catch (err) {
        console.error('Register error:', err);
        showMsg('Unable to connect to server. Please check your connection.');
      } finally {
        setLoading(false);
      }
    });

    [fullnameEl, emailEl, phoneEl, passwordEl, confirmPassEl].forEach(el => {
      el.addEventListener('input', hideMsg);
    });
  </script>

</body>
</html>
